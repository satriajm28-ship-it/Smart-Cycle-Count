<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#00A3FF" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0, 255, 198, 0)" />
      <stop offset="50%" stop-color="rgba(0, 255, 198, 0.8)" />
      <stop offset="100%" stop-color="rgba(0, 255, 198, 0)" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#00A3FF" flood-opacity="0.2" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Square (Launcher base) -->
  <rect width="512" height="512" rx="128" fill="#FFFFFF" />
  
  <!-- Inner Background Accent -->
  <rect width="450" height="450" x="31" y="31" rx="100" fill="url(#blueGrad)" filter="url(#shadow)" />
  
  <!-- Isometric Shipping/Inventory Box -->
  <g transform="translate(136, 120)" stroke="#FFFFFF" stroke-width="14" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- Top Face -->
    <polygon points="120,20 220,70 120,120 20,70" fill="rgba(255, 255, 255, 0.12)" />
    <!-- Left Face -->
    <polygon points="20,70 120,120 120,220 20,170" fill="rgba(255, 255, 255, 0.05)" />
    <!-- Right Face -->
    <polygon points="220,70 120,120 120,220 220,170" fill="rgba(255, 255, 255, 0.08)" />
    <!-- Box Seams & Opening Details -->
    <line x1="120" y1="120" x2="120" y2="220" />
    <line x1="120" y1="20" x2="120" y2="70" />
    <line x1="20" y1="70" x2="120" y2="70" stroke-dasharray="10,10" />
    <line x1="220" y1="70" x2="120" y2="70" stroke-dasharray="10,10" />
  </g>
  
  <!-- Laser Beam/Scanning grid animation representation -->
  <rect x="100" y="270" width="312" height="12" rx="6" fill="url(#glowGrad)" />
  <line x1="100" y1="276" x2="412" y2="276" stroke="#00FFC6" stroke-width="6" stroke-linecap="round" />
  
  <!-- Approved Opname Stamp (Checkmark badge) -->
  <circle cx="370" cy="360" r="50" fill="#10B981" stroke="#FFFFFF" stroke-width="6" />
  <path d="M348 360 L363 375 L395 343" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
